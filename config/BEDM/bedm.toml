# /etc/bedm/bedm.hk — BEDM Display Manager Configuration
# Blue Environment Display Manager v1.0.0
# Format: TOML
# Docs: hackeros-linux-system.github.io/HackerOS-Website/tools-docs/hk.html

[general]
greeter_path = "/usr/bin/bedm-greeter"
vt = 1
theme = "blue"
show_user_list = true
allow_root = false
minimum_uid = 1000
maximum_uid = 65533
clock_format = "%H:%M"
sessions_dir = ["/usr/share/wayland-sessions", "/usr/share/xsessions", "/usr/local/share/wayland-sessions"]

# Uncomment to enable autologin:
# [autologin]
# user = "username"
# session = "blue-environment"
# delay = 0

[power]
shutdown = "shutdown -h now"
reboot = "reboot"
suspend = "systemctl suspend"
hibernate = "systemctl hibernate"
